name: Build WorldEngine Data Collector

on:
  push:
    branches: [main, feature/phase1-valheim]
  pull_request:
    branches: [main]
  release:
    types: [created]

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Job 1: Build dx_capture.dll  (C++17, MSVC x64)
  # ─────────────────────────────────────────────────────────────────────────
  build-dx-capture:
    name: Build dx_capture.dll
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download MinHook 1.3.3
        shell: pwsh
        run: |
          $url = "https://github.com/TsudaKageyu/minhook/releases/download/v1.3.3/MinHook_133_lib.zip"
          Invoke-WebRequest $url -OutFile minhook.zip
          Expand-Archive minhook.zip -DestinationPath C:\minhook_raw
          New-Item -ItemType Directory -Force C:\libs\minhook\include | Out-Null
          New-Item -ItemType Directory -Force C:\libs\minhook\lib     | Out-Null
          Copy-Item C:\minhook_raw\include\MinHook.h         C:\libs\minhook\include\
          Copy-Item "C:\minhook_raw\lib\VC16\x64\MinHook.x64.lib" C:\libs\minhook\lib\

      - name: Download FFmpeg 7.x pre-built (GPL shared, win64)
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl-shared.zip"
          Invoke-WebRequest $url -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath C:\ffmpeg_raw
          $top = (Get-ChildItem C:\ffmpeg_raw -Directory | Select-Object -First 1).FullName
          New-Item -ItemType Directory -Force C:\libs\ffmpeg | Out-Null
          Copy-Item -Recurse "$top\include" C:\libs\ffmpeg\include
          Copy-Item -Recurse "$top\lib"     C:\libs\ffmpeg\lib
          Copy-Item -Recurse "$top\bin"     C:\libs\ffmpeg\bin
          # Make ffmpeg.exe available for the Python control center packaging step
          echo "C:\libs\ffmpeg\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Configure & Build (Release x64)
        shell: pwsh
        run: |
          cmake -B build -S dx_capture -A x64 `
            -DMINHOOK_ROOT="C:/libs/minhook" `
            -DFFMPEG_ROOT="C:/libs/ffmpeg"
          cmake --build build --config Release

      - name: Upload dx_capture.dll
        uses: actions/upload-artifact@v4
        with:
          name: dx-capture-dll
          path: adapters/bin/dx_capture.dll

      - name: Upload FFmpeg runtime DLLs (needed at runtime alongside dx_capture.dll)
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-runtime-dlls
          path: C:\libs\ffmpeg\bin\*.dll

  # ─────────────────────────────────────────────────────────────────────────
  # Job 2: Build WorldEngineCollector.dll  (C# / .NET 4.6 BepInEx plugin)
  #
  # Requires two secrets set in your repo settings:
  #   UNITY_DLLS_URL  – URL to a zip containing the stripped Valheim managed DLLs
  #                     (UnityEngine.dll + UnityEngine.CoreModule.dll)
  #                     Only needed for the C# build; these come from your local
  #                     Valheim installation.  See docs/ci-setup.md for details.
  # BepInEx DLLs are downloaded automatically from the official GitHub release.
  # ─────────────────────────────────────────────────────────────────────────
  build-bepinex-plugin:
    name: Build WorldEngineCollector.dll
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download BepInEx 5.4.23.2 (provides BepInEx.dll + Newtonsoft.Json.dll)
        shell: pwsh
        run: |
          $url = "https://github.com/BepInEx/BepInEx/releases/download/v5.4.23.2/BepInEx_win_x64_5.4.23.2.zip"
          Invoke-WebRequest $url -OutFile bepinex.zip
          Expand-Archive bepinex.zip -DestinationPath C:\bepinex_dist
          echo "BEPINEX_DIR=C:\bepinex_dist\BepInEx\core" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Download Valheim Unity DLL stubs
        if: ${{ secrets.UNITY_DLLS_URL != '' }}
        shell: pwsh
        run: |
          Invoke-WebRequest "${{ secrets.UNITY_DLLS_URL }}" -OutFile unity_dlls.zip
          Expand-Archive unity_dlls.zip -DestinationPath C:\unity_stubs
          echo "VALHEIM_MANAGED_DIR=C:\unity_stubs" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build plugin
        if: ${{ secrets.UNITY_DLLS_URL != '' }}
        shell: pwsh
        run: |
          dotnet build adapters/unity/WorldEngineCollector/WorldEngineCollector.csproj `
            /p:BepInExDir="$env:BEPINEX_DIR" `
            /p:ValheimManagedDir="$env:VALHEIM_MANAGED_DIR" `
            -c Release

      - name: Upload WorldEngineCollector.dll
        if: ${{ secrets.UNITY_DLLS_URL != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: bepinex-plugin
          path: adapters/unity/WorldEngineCollector/bin/Release/WorldEngineCollector.dll

  # ─────────────────────────────────────────────────────────────────────────
  # Job 3: Package Python Control Center as standalone Windows .exe
  # ─────────────────────────────────────────────────────────────────────────
  build-python-exe:
    name: Package Python Control Center
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: pwsh
        run: |
          cd control_center
          pip install PyQt6 pyyaml openpyxl pyinstaller

      - name: Build standalone exe with PyInstaller
        shell: pwsh
        run: |
          cd control_center
          pyinstaller --onefile --windowed `
            --name "WorldEngineControlCenter" `
            --add-data "gui;gui" `
            --collect-all PyQt6 `
            main.py

      - name: Upload control center exe
        uses: actions/upload-artifact@v4
        with:
          name: control-center-exe
          path: control_center/dist/WorldEngineControlCenter.exe

  # ─────────────────────────────────────────────────────────────────────────
  # Job 4: Assemble release package ZIP
  # ─────────────────────────────────────────────────────────────────────────
  package-release:
    name: Assemble Release ZIP
    runs-on: windows-latest
    needs: [build-dx-capture, build-python-exe]
    # build-bepinex-plugin is optional (needs secret); package whatever is ready
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release_artifacts

      - name: Build release directory
        shell: pwsh
        run: |
          $out = "WorldEngine-DataCollector-v1.0"
          New-Item -ItemType Directory -Force $out\dx_capture       | Out-Null
          New-Item -ItemType Directory -Force $out\BepInEx\plugins  | Out-Null
          New-Item -ItemType Directory -Force $out\control_center    | Out-Null

          # dx_capture.dll + FFmpeg runtime DLLs
          Copy-Item release_artifacts\dx-capture-dll\dx_capture.dll         $out\dx_capture\
          if (Test-Path release_artifacts\ffmpeg-runtime-dlls) {
            Copy-Item release_artifacts\ffmpeg-runtime-dlls\*.dll           $out\dx_capture\
          }

          # BepInEx plugin (optional)
          if (Test-Path release_artifacts\bepinex-plugin\WorldEngineCollector.dll) {
            Copy-Item release_artifacts\bepinex-plugin\WorldEngineCollector.dll  $out\BepInEx\plugins\
          }

          # Python control center exe
          Copy-Item release_artifacts\control-center-exe\WorldEngineControlCenter.exe $out\control_center\

          # README and default settings
          Copy-Item docs\install-guide.md $out\README.md -ErrorAction SilentlyContinue

          Compress-Archive -Path $out -DestinationPath "${out}.zip"

      - name: Upload release ZIP
        uses: actions/upload-artifact@v4
        with:
          name: WorldEngine-DataCollector-release
          path: WorldEngine-DataCollector-v1.0.zip

      - name: Attach to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: WorldEngine-DataCollector-v1.0.zip
