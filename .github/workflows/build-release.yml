name: Build WorldEngine Data Collector (single EXE)

on:
  push:
    branches: [main, master, "feature/**"]
  pull_request:
    branches: [main, master]
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    name: Build everything → single EXE
    runs-on: windows-latest

    steps:
      # ── 0. Checkout ───────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── 1. Build dx_capture.dll (C++/MSVC) ───────────────────────────────
      - name: Download MinHook 1.3.3
        shell: pwsh
        run: |
          $url = "https://github.com/TsudaKageyu/minhook/releases/download/v1.3.3/MinHook_133_lib.zip"
          Invoke-WebRequest $url -OutFile minhook.zip
          Expand-Archive minhook.zip -DestinationPath C:\minhook_raw
          New-Item -ItemType Directory -Force C:\libs\minhook\include | Out-Null
          New-Item -ItemType Directory -Force C:\libs\minhook\lib     | Out-Null
          Copy-Item C:\minhook_raw\include\MinHook.h C:\libs\minhook\include\
          # zip ships as libMinHook-x64-v141-md.lib; CMake expects MinHook.x64.lib
          $lib = Get-ChildItem C:\minhook_raw\lib -Filter "libMinHook-x64-v141-md.lib" | Select-Object -First 1
          if (-not $lib) { Write-Error "libMinHook-x64-v141-md.lib not found in zip"; exit 1 }
          Copy-Item $lib.FullName C:\libs\minhook\lib\MinHook.x64.lib

      - name: Download FFmpeg 7.x GPL shared win64
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl-shared.zip"
          Invoke-WebRequest $url -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath C:\ffmpeg_raw
          $top = (Get-ChildItem C:\ffmpeg_raw -Directory | Select-Object -First 1).FullName
          New-Item -ItemType Directory -Force C:\libs\ffmpeg | Out-Null
          Copy-Item -Recurse "$top\include" C:\libs\ffmpeg\include
          Copy-Item -Recurse "$top\lib"     C:\libs\ffmpeg\lib
          # FFmpeg runtime DLLs — bundled into the Python EXE later
          Copy-Item -Recurse "$top\bin"     C:\libs\ffmpeg\bin

      - name: Build dx_capture.dll
        shell: pwsh
        run: |
          cmake -B build_cpp -S dx_capture -A x64 `
            -DMINHOOK_ROOT="C:/libs/minhook" `
            -DFFMPEG_ROOT="C:/libs/ffmpeg"
          cmake --build build_cpp --config Release
          # Confirm DLL was produced
          if (-not (Test-Path adapters\bin\dx_capture.dll)) {
            Write-Error "dx_capture.dll not produced"; exit 1
          }

      # ── 2. Build Unity stubs (no Valheim needed) ──────────────────────────
      - name: Build Unity & BepInEx stubs
        shell: pwsh
        run: |
          $stubs = "adapters\unity\stubs"
          dotnet build "$stubs\UnityEngine.csproj" -c Release --nologo
          # BepInEx.csproj references the stub UnityEngine.dll already built above
          dotnet build "$stubs\BepInEx.csproj"    -c Release --nologo

      # ── 3. Build WorldEngineCollector.dll (BepInEx plugin) ───────────────
      - name: Build WorldEngineCollector.dll
        shell: pwsh
        env:
          CI: "true"
        run: |
          $plugin = "adapters\unity\WorldEngineCollector"
          dotnet build "$plugin\WorldEngineCollector.csproj" `
            -c Release --nologo `
            /p:CI=true

      # ── 3b. Build WorldEngineCollector_Skyrim.dll (SKSE plugin) ──────────────
      - name: Build WorldEngineCollector_Skyrim.dll
        shell: pwsh
        run: |
          cmake -B build_skyrim -S adapters/skyrim -A x64
          cmake --build build_skyrim --config Release
          $dll = "build_skyrim\Release\WorldEngineCollector.dll"
          if (-not (Test-Path $dll)) {
            Write-Error "Skyrim DLL not produced at $dll"; exit 1
          }
          Copy-Item $dll adapters\bin\WorldEngineCollector_Skyrim.dll
          Write-Host "Skyrim DLL built OK"

      # ── 4. Package everything as a single Windows EXE (PyInstaller) ───────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        shell: pwsh
        run: |
          cd control_center
          pip install --quiet PyQt6 pyyaml openpyxl pyinstaller

      - name: Collect DLLs for bundling
        shell: pwsh
        run: |
          # Gather all runtime DLLs into a single staging folder
          New-Item -ItemType Directory -Force bundle_dlls | Out-Null

          # dx_capture.dll
          Copy-Item adapters\bin\dx_capture.dll bundle_dlls\

          # FFmpeg runtime DLLs (needed by dx_capture at load time)
          Copy-Item C:\libs\ffmpeg\bin\*.dll bundle_dlls\

          # BepInEx plugin DLL (user copies to Valheim/BepInEx/plugins/ via the control center)
          $pluginBin = "adapters\unity\WorldEngineCollector\bin\Release\netstandard2.0"
          if (Test-Path "$pluginBin\WorldEngineCollector.dll") {
            Copy-Item "$pluginBin\WorldEngineCollector.dll" bundle_dlls\
          }

          Write-Host "Bundling DLLs:"
          Get-ChildItem bundle_dlls

      - name: Build app with PyInstaller (onedir)
        shell: pwsh
        run: |
          # Validate required DLLs are present before packaging
          $required = @("dx_capture.dll", "WorldEngineCollector.dll")
          foreach ($dll in $required) {
            if (-not (Test-Path "bundle_dlls\$dll")) {
              Write-Error "Required DLL missing: bundle_dlls\$dll"
              exit 1
            }
          }

          # Build --add-binary flags for every DLL in bundle_dlls/
          $binaryFlags = (Get-ChildItem bundle_dlls -Filter *.dll |
            ForEach-Object { "--add-binary `"bundle_dlls\$($_.Name);.`"" }) -join " "

          # --onedir avoids extracting to %TEMP%, which causes COM/RegisterDragDrop
          # crashes on some Win11 machines when code is loaded from a temp path.
          $cmd = "pyinstaller " +
            "--onedir --windowed " +
            "--uac-admin " +
            "--name WorldEngineDataCollector " +
            "--collect-all PyQt6 " +
            "--add-data `"control_center/gui;gui`" " +
            "--add-data `"control_center/config;config`" " +
            "--paths control_center " +
            $binaryFlags + " " +
            "control_center/main.py"

          Write-Host "PyInstaller command: $cmd"
          Invoke-Expression $cmd

          # Confirm output
          if (-not (Test-Path "dist\WorldEngineDataCollector\WorldEngineDataCollector.exe")) {
            Write-Error "EXE not produced"
            exit 1
          }
          Write-Host "Build OK"
          Compress-Archive -Path dist\WorldEngineDataCollector\* -DestinationPath dist\WorldEngineDataCollector.zip

      # ── 5. Upload artifact ────────────────────────────────────────────────
      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: WorldEngineDataCollector
          path: dist\WorldEngineDataCollector.zip

      # ── 7. Package Cyberpunk 2077 CET mod ────────────────────────────────────
      - name: Package Cyberpunk 2077 CET mod
        shell: pwsh
        run: |
          $modDir = "dist_cp2077\bin\x64\plugins\cyber_engine_tweaks\mods\WorldEngineCollector"
          New-Item -ItemType Directory -Force $modDir | Out-Null
          Copy-Item adapters\cyberpunk\WorldEngineCollector\metadata.json $modDir\
          Copy-Item adapters\cyberpunk\WorldEngineCollector\init.lua      $modDir\
          Compress-Archive -Path dist_cp2077\* -DestinationPath dist\WorldEngineCollector_CP2077.zip
          Write-Host "CP2077 mod packaged"

      - name: Upload CP2077 mod artifact
        uses: actions/upload-artifact@v4
        with:
          name: WorldEngineCollector_CP2077
          path: dist\WorldEngineCollector_CP2077.zip

      # ── 8. Package Skyrim SKSE plugin ─────────────────────────────────────────
      - name: Package Skyrim SKSE plugin
        shell: pwsh
        run: |
          $pluginDir = "dist_skyrim\Data\SKSE\Plugins"
          New-Item -ItemType Directory -Force $pluginDir | Out-Null
          Copy-Item adapters\bin\WorldEngineCollector_Skyrim.dll $pluginDir\
          # dx_capture.dll + FFmpeg DLLs + ffmpeg.exe go to the Skyrim root (same dir as SkyrimSE.exe)
          Copy-Item adapters\bin\dx_capture.dll dist_skyrim\
          Copy-Item C:\libs\ffmpeg\bin\*.dll    dist_skyrim\
          Copy-Item C:\libs\ffmpeg\bin\ffmpeg.exe dist_skyrim\
          Compress-Archive -Path dist_skyrim\* -DestinationPath dist\WorldEngineCollector_Skyrim.zip
          Write-Host "Skyrim plugin packaged"

      - name: Upload Skyrim plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: WorldEngineCollector_Skyrim
          path: dist\WorldEngineCollector_Skyrim.zip

      # ── 6. Attach to GitHub Release (only on release events) ─────────────
      - name: Attach to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist\WorldEngineDataCollector.zip
            dist\WorldEngineCollector_CP2077.zip
            dist\WorldEngineCollector_Skyrim.zip
